# ============================================================
#  Tauá Fernandes — static site server block
#  Sits behind Traefik (TLS/redirect) and Cloudflare (proxy/CDN).
#  This origin only speaks HTTP on :80 — Traefik terminates TLS.
# ============================================================
server {
    listen 80;
    listen [::]:80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Trust X-Forwarded-* from Traefik/Cloudflare (real client IP in logs).
    real_ip_header X-Forwarded-For;
    set_real_ip_from 0.0.0.0/0;

    # ---- Compression (Cloudflare adds Brotli at the edge; gzip here covers origin) ----
    gzip            on;
    gzip_vary       on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied    any;
    gzip_types
        text/plain text/css application/javascript application/json
        image/svg+xml application/manifest+json application/xml application/rss+xml;

    # ---- Security headers ----
    add_header X-Content-Type-Options "nosniff"                     always;
    add_header X-Frame-Options        "SAMEORIGIN"                  always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "geolocation=(), microphone=(), camera=()" always;

    # ---- Health endpoint (used by the Swarm/Traefik healthcheck) ----
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ---- Fingerprint-stable media: long, immutable cache ----
    location /assets/ {
        access_log off;
        expires    30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # .webmanifest is not in nginx's default mime.types — set it explicitly.
    location = /site.webmanifest {
        default_type application/manifest+json;
        add_header   Cache-Control "public, max-age=86400";
    }

    location = /robots.txt  { add_header Cache-Control "public, max-age=3600"; }
    location = /sitemap.xml { add_header Cache-Control "public, max-age=3600"; }

    # ---- HTML: always revalidate (Cloudflare cache is purged on every deploy) ----
    location = / {
        add_header Cache-Control "public, max-age=0, must-revalidate";
        try_files /index.html =404;
    }
    location = /index.html {
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
